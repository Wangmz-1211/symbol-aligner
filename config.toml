# Symbol Aligner configuration.
# All thresholds and weights live here — never hard-coded in the source.

[matching]
top_k = 3

[thresholds]
auto_apply = 0.99   # top-1 score >= this  -> apply automatically, no LLM
recall_min = 0.45   # top-1 score in [recall_min, auto_apply) -> ask the LLM
                    # top-1 score <  recall_min -> discard

[llm]
# Local Ollama deployment.
backend    = "anthropic"
base_url   = "https://api.anthropic.com"
model      = "claude-haiku-4-5-20251001"
max_tokens = 64
timeout    = 30.0
cache      = true

[scoring.weights]
ratio            = 0.40
partial_ratio    = 0.25
token_sort_ratio = 0.20
jaro_winkler     = 0.15
